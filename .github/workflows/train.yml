
name: ML Mirchi CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Check model creation
        run: |
          python -c "from src.model import create_model, count_parameters; m = create_model(); print(count_parameters(m))"

      - name: Lint check
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E501,W503
